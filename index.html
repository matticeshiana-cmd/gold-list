<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gold List">
  <title>Gold List 금 · Korean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body style="margin:0;background:#0D1117">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── Constants & Helpers ────────────────────────────────────────────────────
const STORAGE_KEY = "korean_goldlist_v1";
const DISTILL_DAYS = 14;
const MAX_HISTORY = 15;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr = () => new Date().toISOString().slice(0, 10);
const addDays = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); };
const daysUntil = (d) => Math.ceil((new Date(d) - new Date(todayStr())) / 86400000);
const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const fmtDateFull = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

function generateICS(label, distillableAt) {
  const d = new Date(distillableAt + "T09:00:00");
  const pad = (n) => String(n).padStart(2, "0");
  const fmt = (dt) => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Korean Gold List//EN","BEGIN:VEVENT",
    `DTSTART:${fmt(d)}`,`DTEND:${fmt(new Date(d.getTime()+3600000))}`,
    `SUMMARY:🇰🇷 Distill Korean Gold List — ${label}`,
    `DESCRIPTION:Your ${label} is ready to distill. Open Gold List\\, check off what you know\\, and carry the rest forward.`,
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
}
function downloadICS(list) {
  const label = list.level === 0 ? `Day ${list.dayNumber} Headlist` : `D${list.level}`;
  const blob = new Blob([generateICS(label, list.distillableAt)], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url;
  a.download = `goldlist-${label.toLowerCase().replace(/\s+/g,"-")}.ics`;
  a.click(); URL.revokeObjectURL(url);
}
function listStatus(list) {
  if (list.distilledTo) return "distilled";
  if (daysUntil(list.distillableAt) > 0) return "waiting";
  return "ready";
}
function getRootDay(list, allLists) {
  let cur = list;
  while (cur && cur.level > 0) cur = allLists.find(l => l.id === cur.parentId);
  return cur?.dayNumber ?? "?";
}

// ─── Claude API ───────────────────────────────────────────────────────────────
async function fetchWordBreakdown(word) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: `You are a Korean language expert. Analyze the given Korean word. Return ONLY a valid JSON object — no markdown, no backticks, no text outside the JSON.

Schema:
{
  "word": "string",
  "isHomonym": boolean,
  "meanings": [{
    "hanja": "string or null",
    "label": "short English label",
    "coreMeaning": "2-3 sentence core meaning and etymology",
    "exampleSentence": {"korean": "string", "english": "string"},
    "contexts": [{"label":"string","icon":"emoji","description":"1-2 sentences","example":{"korean":"string","english":"string"}}],
    "collocations": [{"korean":"string","english":"string"}],
    "comparisons": [{"word":"string","nuance":"string"}],
    "tip": "practical learning tip"
  }]
}

Provide 4-5 contexts, 5-6 collocations, 3-5 comparisons per meaning. Homonyms get separate objects in the meanings array.`,
      messages: [{ role: "user", content: word }]
    })
  });
  if (!res.ok) throw new Error(res.status);
  const data = await res.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("").replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

// ─── Design Tokens ────────────────────────────────────────────────────────────
const C = {
  bg: "#0D1117", surface: "#161B22", surface2: "#1C2128", border: "#30363D",
  text: "#E6EDF3", muted: "#7D8590",
  accent: "#E8734A", accentDim: "#2A1A12",
  green: "#3FB950", greenDim: "#0F2417",
  gold: "#D4A84B", goldDim: "#1E1A0D",
  blue: "#58A6FF", blueDim: "#0D1F33",
  purple: "#A78BFA", purpleDim: "#1A1030",
};
const TYPE = {
  vocab:   { color: C.blue,   dim: C.blueDim,   label: "단어", en: "Vocab" },
  grammar: { color: C.purple, dim: C.purpleDim, label: "문법", en: "Grammar" },
  phrase:  { color: C.gold,   dim: C.goldDim,   label: "표현", en: "Phrase" },
};
const inputBase = {
  width: "100%", boxSizing: "border-box", padding: "11px 14px",
  background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10,
  color: C.text, fontSize: 15, fontFamily: "inherit", outline: "none", transition: "border-color 0.15s",
};

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData]             = useState(null);
  const [view, setView]             = useState("dashboard");
  const [selectedId, setSelectedId] = useState(null);
  const [prefill, setPrefill]       = useState(null);       // { korean, note } pre-fills Today form
  const [lookupInit, setLookupInit] = useState(null);       // word string to pre-search on Lookup tab
  const [loading, setLoading]       = useState(true);

  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap";
    document.head.appendChild(link);
    const style = document.createElement("style");
    style.textContent = `
      * { box-sizing: border-box; } body { margin: 0; background: ${C.bg}; }
      ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: ${C.border}; border-radius: 3px; }
      input::placeholder, textarea::placeholder { color: ${C.muted}; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
      @keyframes charCycle { 0%,100%{opacity:1} 50%{opacity:0.3} }
      .fade-up { animation: fadeUp 0.3s ease forwards; }
      .card-hover { transition: border-color 0.15s, transform 0.15s; }
      .card-hover:hover { border-color: ${C.accent} !important; transform: translateY(-1px); }
    `;
    document.head.appendChild(style);
    async function load() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        const parsed = s ? JSON.parse(s) : {};
        setData({ lists: [], lookupHistory: [], ...parsed });
      } catch { setData({ lists: [], lookupHistory: [] }); }
      setLoading(false);
    }
    load();
  }, []);

  const save = (nd) => {
    setData(nd);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(nd)); } catch {}
  };

  const todayList  = data?.lists.find(l => l.level === 0 && l.createdAt === todayStr()) ?? null;
  const readyLists = data?.lists.filter(l => !l.distilledTo && listStatus(l) === "ready") ?? [];

  const createToday = async () => {
    const n = data.lists.filter(l => l.level === 0).length;
    const today = todayStr();
    const nl = { id: uid(), dayNumber: n+1, level:0, parentId:null,
      createdAt:today, distillableAt:addDays(today, DISTILL_DAYS), entries:[], distilledTo:null };
    await save({ ...data, lists: [...data.lists, nl] });
    setView("today");
  };
  const addEntry = async (entry) => {
    if (!todayList || todayList.entries.length >= 25) return;
    const updated = { ...todayList, entries: [...todayList.entries, { id: uid(), ...entry }] };
    await save({ ...data, lists: data.lists.map(l => l.id === todayList.id ? updated : l) });
  };
  const removeEntry = async (listId, entryId) => {
    await save({ ...data, lists: data.lists.map(l =>
      l.id === listId ? { ...l, entries: l.entries.filter(e => e.id !== entryId) } : l) });
  };
  const doDistill = async (sourceId, unknownIds) => {
    const src = data.lists.find(l => l.id === sourceId);
    if (!src) return;
    const today = todayStr();
    const newEntries = src.entries.filter(e => unknownIds.includes(e.id)).map(e => ({ ...e, id: uid() }));
    const newListId = unknownIds.length > 0 ? uid() : "completed";
    const newList = unknownIds.length > 0 ? {
      id: newListId, dayNumber:null, level:src.level+1, parentId:sourceId,
      createdAt:today, distillableAt:addDays(today, DISTILL_DAYS), entries:newEntries, distilledTo:null,
    } : null;
    await save({ ...data, lists: [
      ...data.lists.map(l => l.id === sourceId ? { ...l, distilledTo: newListId } : l),
      ...(newList ? [newList] : []),
    ]});
    setView("dashboard");
  };

  // Navigation helpers
  const nav = (v, id = null) => {
    setView(v); if (id !== null) setSelectedId(id);
    if (v !== "today") setPrefill(null);
    if (v !== "lookup") setLookupInit(null);
  };
  const goLookup = (word = null) => { setLookupInit(word); setView("lookup"); };
  const goTodayPrefill = (word, english, note) => { setPrefill({ korean: word, english, note }); setView("today"); };

  if (loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh",
      background:C.bg, fontFamily:"Outfit, sans-serif", color:C.muted }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:40, animation:"pulse 1.5s infinite" }}>금</div>
        <div style={{ marginTop:8, fontSize:13 }}>Loading...</div>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"Outfit, sans-serif", color:C.text }}>
      <Nav view={view} nav={nav} goLookup={goLookup} todayList={todayList} readyCount={readyLists.length} />
      <div style={{ maxWidth:680, margin:"0 auto", padding:"28px 16px 100px" }}>
        {view === "dashboard"   && <Dashboard data={data} todayList={todayList} createToday={createToday} nav={nav} />}
        {view === "today"  && todayList  && <TodayView list={todayList} addEntry={addEntry} removeEntry={removeEntry} prefill={prefill} clearPrefill={() => setPrefill(null)} goLookup={goLookup} />}
        {view === "today"  && !todayList && <NoTodayList createToday={createToday} />}
        {view === "lookup"      && <LookupView data={data} save={save} initialWord={lookupInit} todayList={todayList} goTodayPrefill={goTodayPrefill} clearInit={() => setLookupInit(null)} />}
        {view === "distill"     && <DistillPicker lists={readyLists} allLists={data.lists} nav={nav} />}
        {view === "distillList" && selectedId && <DistillView list={data.lists.find(l => l.id === selectedId)} allLists={data.lists} doDistill={doDistill} setView={setView} />}
        {view === "viewList"    && selectedId && <ListView list={data.lists.find(l => l.id === selectedId)} allLists={data.lists} nav={nav} />}
        {view === "practice" && <PracticeView/>}
      </div>
    </div>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function Nav({ view, nav, goLookup, todayList, readyCount }) {
  const tabs = [
    { id:"dashboard", icon:"◈", label:"Lists",   action: () => nav("dashboard") },
    { id:"today",     icon:"✦", label: todayList ? `Today ${todayList.entries.length}/25` : "Today", action: () => nav("today") },
    { id:"lookup",    icon:"◎", label:"Look Up",  action: () => goLookup() },
    { id:"practice",  icon:"✏", label:"Practice", action: () => nav("practice") },
    ...(readyCount > 0 ? [{ id:"distill", icon:"◉", label:`Distill · ${readyCount}`, action: () => nav("distill") }] : []),
  ];
  const activeTab = view === "distillList" ? "distill" : view;
  return (
    <nav style={{ position:"sticky", top:0, zIndex:20, background:"rgba(13,17,23,0.92)", backdropFilter:"blur(16px)", borderBottom:`1px solid ${C.border}` }}>
      <div style={{ maxWidth:680, margin:"0 auto", padding:"0 16px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", height:56 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:20, color:C.accent }}>금</div>
            <div style={{ display:"flex", flexDirection:"column" }}>
              <span style={{ fontSize:14, fontWeight:600, color:C.text, lineHeight:1.1 }}>Gold List</span>
              <span style={{ fontSize:10, color:C.muted, letterSpacing:"0.1em", textTransform:"uppercase" }}>한국어</span>
            </div>
          </div>
          <div style={{ display:"flex", gap:3 }}>
            {tabs.map(t => {
              const active = activeTab === t.id;
              return (
                <button key={t.id} onClick={t.action} style={{
                  padding:"6px 11px", border: active ? `1px solid ${C.accent}40` : "1px solid transparent",
                  borderRadius:20, background: active ? C.accentDim : "transparent",
                  color: active ? C.accent : C.muted, cursor:"pointer", fontSize:12, fontWeight: active ? 600 : 400,
                  fontFamily:"Outfit, sans-serif", display:"flex", alignItems:"center", gap:4, transition:"all 0.15s",
                }}>
                  <span style={{ fontSize:9 }}>{t.icon}</span>{t.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </nav>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ data, todayList, createToday, nav }) {
  const headlists = [...data.lists.filter(l => l.level === 0)].sort((a,b) => b.dayNumber - a.dayNumber);
  const childOf = {};
  data.lists.forEach(l => { if (l.parentId) childOf[l.parentId] = l; });
  const totalEntries = data.lists.reduce((s,l) => s + (l.level===0 ? l.entries.length : 0), 0);

  return (
    <div className="fade-up">
      {!todayList ? (
        <button onClick={createToday} style={{ width:"100%", padding:"28px", border:`1px dashed ${C.accent}60`,
          borderRadius:20, background:C.accentDim, cursor:"pointer", textAlign:"left", marginBottom:28,
          fontFamily:"Outfit, sans-serif", transition:"all 0.2s" }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.background="#3A1A0E";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=`${C.accent}60`;e.currentTarget.style.background=C.accentDim;}}>
          <div style={{ fontSize:12, color:`${C.accent}AA`, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>{fmtDateFull(todayStr())}</div>
          <div style={{ fontSize:22, fontWeight:700, color:C.accent, marginBottom:4 }}>Start Today's Headlist →</div>
          <div style={{ fontSize:14, color:`${C.accent}80` }}>25 new words · Day {data.lists.filter(l=>l.level===0).length+1}</div>
        </button>
      ) : (
        <button onClick={() => nav("today")} style={{ width:"100%", padding:"24px 28px",
          border:`1px solid ${todayList.entries.length>=25 ? C.green+"60" : C.accent+"60"}`,
          borderRadius:20, background: todayList.entries.length>=25 ? C.greenDim : C.accentDim,
          cursor:"pointer", textAlign:"left", marginBottom:28, fontFamily:"Outfit, sans-serif" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:12, color:C.muted, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>
                Day {todayList.dayNumber} · Today's Headlist
              </div>
              <div style={{ fontSize:20, fontWeight:700, color: todayList.entries.length>=25 ? C.green : C.accent }}>
                {todayList.entries.length>=25 ? "Complete! ✓ Come back in 14 days." : `${todayList.entries.length} / 25 entries added`}
              </div>
            </div>
            <ProgressRing value={todayList.entries.length} max={25} color={todayList.entries.length>=25 ? C.green : C.accent} />
          </div>
          {todayList.entries.length < 25 && (
            <div style={{ marginTop:14, height:4, background:C.border, borderRadius:99, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${(todayList.entries.length/25)*100}%`, background:C.accent, borderRadius:99, transition:"width 0.4s ease" }} />
            </div>
          )}
        </button>
      )}

      {headlists.length > 0 && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:28 }}>
          {[
            { label:"Total Days", value:headlists.length, icon:"📅" },
            { label:"Total Words", value:totalEntries, icon:"✍️" },
            { label:"Ready to Distill", value:data.lists.filter(l=>!l.distilledTo&&listStatus(l)==="ready").length, icon:"✨" },
          ].map(s => (
            <div key={s.label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px" }}>
              <div style={{ fontSize:18, marginBottom:4 }}>{s.icon}</div>
              <div style={{ fontSize:24, fontWeight:700 }}>{s.value}</div>
              <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:"0.07em" }}>{s.label}</div>
            </div>
          ))}
        </div>
      )}

      {headlists.length === 0 ? (
        <div style={{ textAlign:"center", color:C.muted, paddingTop:48 }}>
          <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:48, marginBottom:16, opacity:0.3 }}>금</div>
          <div style={{ fontSize:15 }}>No lists yet — start your first headlist above.</div>
        </div>
      ) : (
        <div>
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em", color:C.muted, marginBottom:14, fontWeight:600 }}>Distillation Chains</div>
          {headlists.map(hl => <ListChainRow key={hl.id} headlist={hl} childOf={childOf} nav={nav} />)}
        </div>
      )}
    </div>
  );
}

function ProgressRing({ value, max, color }) {
  const r = 20, circ = 2 * Math.PI * r, pct = Math.min(value / max, 1);
  return (
    <svg width={52} height={52} viewBox="0 0 52 52">
      <circle cx={26} cy={26} r={r} fill="none" stroke={`${color}20`} strokeWidth={4} />
      <circle cx={26} cy={26} r={r} fill="none" stroke={color} strokeWidth={4}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        transform="rotate(-90 26 26)" style={{ transition:"stroke-dashoffset 0.4s ease" }} />
      <text x={26} y={30} textAnchor="middle" fontSize={11} fontWeight={700} fill={color} fontFamily="Outfit, sans-serif">{value}</text>
    </svg>
  );
}

function ListChainRow({ headlist, childOf, nav }) {
  const chain = [headlist];
  let cur = headlist;
  while (childOf[cur.id]) { cur = childOf[cur.id]; chain.push(cur); }
  return (
    <div style={{ marginBottom:12, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
      {chain.map((list, i) => {
        const s = listStatus(list);
        const ss = {
          ready:     { border:C.green,  bg:C.greenDim, label:"Distill →", lc:C.green },
          waiting:   { border:C.gold,   bg:C.goldDim,  label:`${daysUntil(list.distillableAt)}d`, lc:C.gold },
          distilled: { border:C.border, bg:C.surface,  label:"✓ done", lc:C.muted },
        }[s];
        return (
          <div key={list.id} style={{ display:"flex", alignItems:"center", gap:6 }}>
            {i > 0 && <div style={{ color:C.muted, fontSize:14 }}>→</div>}
            <button onClick={() => s==="ready" ? nav("distillList", list.id) : nav("viewList", list.id)}
              className="card-hover"
              style={{ background:ss.bg, border:`1px solid ${ss.border}40`, borderRadius:10, padding:"10px 14px", cursor:"pointer", textAlign:"left", fontFamily:"Outfit, sans-serif" }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.text, marginBottom:2 }}>{list.level===0 ? `Day ${list.dayNumber}` : `D${list.level}`}</div>
              <div style={{ fontSize:11, color:C.muted, marginBottom:6 }}>{list.entries.length} entries</div>
              <div style={{ fontSize:11, color:ss.lc, fontWeight:600 }}>{ss.label}</div>
            </button>
          </div>
        );
      })}
    </div>
  );
}

// ─── Today View ───────────────────────────────────────────────────────────────
function TodayView({ list, addEntry, removeEntry, prefill, clearPrefill, goLookup }) {
  const [type, setType]       = useState("vocab");
  const [korean, setKorean]   = useState("");
  const [english, setEnglish] = useState("");
  const [note, setNote]       = useState("");
  const [saving, setSaving]   = useState(false);
  const full = list.entries.length >= 25;

  // Apply prefill when returning from Lookup
  useEffect(() => {
    if (prefill) {
      if (prefill.korean)  setKorean(prefill.korean);
      if (prefill.english) setEnglish(prefill.english);
      if (prefill.note)    setNote(prefill.note);
      clearPrefill();
      setTimeout(() => document.getElementById(prefill.english ? "kor-i" : "eng-i")?.focus(), 100);
    }
  }, [prefill]);

  const handleAdd = async () => {
    if (!korean.trim() || !english.trim() || saving) return;
    setSaving(true);
    await addEntry({ type, korean: korean.trim(), english: english.trim(), note: note.trim() });
    setKorean(""); setEnglish(""); setNote("");
    setSaving(false);
    document.getElementById("korean-input")?.focus();
  };
  const handleKey = (e) => { if (e.key === "Enter" && korean.trim() && english.trim()) handleAdd(); };

  return (
    <div className="fade-up">
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>{fmtDateFull(list.createdAt)}</div>
        <div style={{ fontSize:26, fontWeight:700, marginBottom:2 }}>Day {list.dayNumber}</div>
        <div style={{ color:C.muted, fontSize:14 }}>Distillable from <span style={{ color:C.text }}>{fmtDateFull(list.distillableAt)}</span></div>
      </div>

      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:24 }}>

// ─── Lookup View ──────────────────────────────────────────────────────────────
function LookupView({ data, save, initialWord, todayList, goTodayPrefill, clearInit }) {
  const [query,   setQuery]   = useState(initialWord || "");
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const history = data.lookupHistory || [];

  useEffect(() => {
    if (initialWord) {
      const cached = history.find(h => h.word === initialWord && h.result);
      if (cached) { setResult(cached.result); setQuery(initialWord); }
      else doSearch(initialWord);
      clearInit();
    }
  }, []);

  const doSearch = async (word) => {
    const w = (word || query).trim(); if (!w) return;
    const cached = history.find(h => h.word === w && h.result);
    if (cached) { setResult(cached.result); setQuery(w); return; }
    setLoading(true); setError(null); setResult(null); setQuery(w);
    try {
      const res = await fetch("/api/lookup", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ word: w })
      });
      if (!res.ok) throw new Error("HTTP_" + res.status);
      const d2 = await res.json();
      const text = d2.content.filter(b => b.type==="text").map(b => b.text).join("").replace(/```json|```/g,"").trim();
      const r = JSON.parse(text);
      setResult(r);
      const newHist = [{ word:w, lookedUpAt:new Date().toISOString().slice(0,10), result:r },
        ...history.filter(h => h.word!==w)].slice(0,15);
      save({ ...data, lookupHistory:newHist });
    } catch(e) { setError(String(e.message||"Unknown error")); }
    setLoading(false);
  };

  return (
    <div className="fade-up">
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:22, fontWeight:700, marginBottom:4 }}>Word Lookup</div>
        <div style={{ color:C.muted, fontSize:14 }}>Full breakdown — contexts, collocations, comparisons</div>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:20 }}>
        <input value={query} onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key==="Enter" && doSearch()}
          placeholder="한국어 단어 입력..."
          style={{ ...inputBase, fontFamily:"Noto Serif KR, serif", fontSize:17, flex:1 }}
          onFocus={e => e.target.style.borderColor=C.accent}
          onBlur={e => e.target.style.borderColor=C.border}/>
        <button onClick={() => doSearch()} disabled={!query.trim()||loading} style={{
          padding:"11px 20px", background:query.trim()&&!loading ? C.accent:C.border,
          border:"none", borderRadius:10, color:query.trim()&&!loading ? "#000":C.muted,
          cursor:query.trim()&&!loading ? "pointer":"default",
          fontFamily:"Outfit, sans-serif", fontSize:14, fontWeight:700, flexShrink:0
        }}>{loading ? "..." : "Look Up"}</button>
      </div>
      {!result && !loading && !error && history.length>0 && (
        <div style={{ marginBottom:24 }}>
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em", color:C.muted, marginBottom:10, fontWeight:600 }}>Recent</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {history.map(h => (
              <button key={h.word} onClick={() => { setQuery(h.word); if(h.result) setResult(h.result); else doSearch(h.word); }}
                style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:20,
                  padding:"5px 14px", cursor:"pointer", fontFamily:"Noto Serif KR, serif", fontSize:15, color:C.text }}
                onMouseEnter={e => e.currentTarget.style.borderColor=C.accent}
                onMouseLeave={e => e.currentTarget.style.borderColor=C.border}>
                {h.word}
              </button>
            ))}
          </div>
        </div>
      )}
      {loading && <LookupLoading word={query} />}
      {error && (
        <div style={{ background:C.accentDim, border:`1px solid ${C.accent}40`, borderRadius:12, padding:"16px 20px" }}>
          <div style={{ fontWeight:600, color:C.accent, marginBottom:4 }}>Lookup failed</div>
          <div style={{ fontSize:13, color:C.muted }}>{error}</div>
        </div>
      )}
      {result && !loading && <WordResult result={result} todayList={todayList} goTodayPrefill={goTodayPrefill} />}
    </div>
  );
}


// ─── Lookup Loading ───────────────────────────────────────────────────────────
function LookupLoading({ word }) {
  const chars = ["가","나","다","라","마","바","사","아","자","차","카","타","파","하"];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setIdx(i => (i+1) % chars.length), 300);
    return () => clearInterval(t);
  }, []);
  return (
    <div style={{ textAlign:"center", padding:"56px 0" }}>
      <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:56, color:C.accent, marginBottom:20, lineHeight:1 }}>
        {chars[idx]}
      </div>
      <div style={{ color:C.muted, fontSize:14 }}>
        Looking up <strong style={{ color:C.text, fontFamily:"Noto Serif KR, serif" }}>"{word}"</strong>...
      </div>
    </div>
  );
}

// ─── Distill View ─────────────────────────────────────────────────────────────
function DistillView({ list, allLists, doDistill, setView }) {
  const [knownIds, setKnownIds] = useState(new Set());
  if (!list) return null;
  const toggle = (id) => setKnownIds(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const unknownCount = list.entries.length - knownIds.size;
  const allKnown = knownIds.size === list.entries.length;

  return (
    <div className="fade-up">
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>
          {list.level===0 ? `Day ${list.dayNumber} Headlist` : `Distillation ${list.level}`}
        </div>
        <div style={{ fontSize:26, fontWeight:700, marginBottom:6 }}>{allKnown ? "All Known! 🎉" : `Carrying forward ${unknownCount}`}</div>
        <div style={{ fontSize:14, color:C.muted }}>Tap entries you <strong style={{ color:C.green }}>already know</strong>. They won't carry forward.</div>
      </div>

      <div style={{ display:"flex", gap:10, marginBottom:20 }}>
        <div style={{ flex:1, background:C.greenDim, border:`1px solid ${C.green}40`, borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
          <div style={{ fontSize:20, fontWeight:700, color:C.green }}>{knownIds.size}</div>
          <div style={{ fontSize:11, color:C.muted }}>Known</div>
        </div>
        <div style={{ flex:1, background:C.accentDim, border:`1px solid ${C.accent}40`, borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
          <div style={{ fontSize:20, fontWeight:700, color:C.accent }}>{unknownCount}</div>
          <div style={{ fontSize:11, color:C.muted }}>Carry forward</div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:24 }}>
        {list.entries.map(e => {
          const known = knownIds.has(e.id);
          return (
            <div key={e.id} onClick={() => toggle(e.id)} style={{
              background: known ? C.greenDim : C.surface, border:`1px solid ${known ? C.green+"50" : C.border}`,
              borderRadius:12, padding:"14px 16px", cursor:"pointer",
              display:"flex", gap:14, alignItems:"flex-start", opacity: known ? 0.65 : 1, transition:"all 0.15s",
            }}>
              <div style={{ width:22, height:22, borderRadius:6, flexShrink:0, marginTop:3,
                border:`2px solid ${known ? C.green : C.border}`, background: known ? C.green : "transparent",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:12, fontWeight:700, color:"#000", transition:"all 0.15s" }}>
                {known && "✓"}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:4 }}>
                  <span style={{ fontFamily:"Noto Serif KR, serif", fontSize:18, fontWeight:700,
                    textDecoration: known?"line-through":"none", color: known ? C.muted : C.text }}>{e.korean}</span>
                  <TypePill type={e.type} />
                </div>
                <div style={{ fontSize:14, color: known ? C.muted : C.text }}>{e.english}</div>
                {e.note && <div style={{ fontSize:12, color:C.muted, marginTop:4, fontStyle:"italic" }}>{e.note}</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:10 }}>
        <button onClick={() => setView("dashboard")} style={{ flex:1, padding:"14px", border:`1px solid ${C.border}`, borderRadius:12, background:"transparent", cursor:"pointer", fontFamily:"Outfit, sans-serif", fontSize:14, color:C.muted }}>Cancel</button>
        <button onClick={() => doDistill(list.id, list.entries.map(e=>e.id).filter(id=>!knownIds.has(id)))} style={{
          flex:2, padding:"14px", border:"none", borderRadius:12,
          background: allKnown ? C.green : C.accent, color:"#000",
          cursor:"pointer", fontFamily:"Outfit, sans-serif", fontSize:14, fontWeight:700,
        }}>{allKnown ? "All mastered! Finish ✓" : `Save D${list.level+1} → ${unknownCount} items`}</button>
      </div>
    </div>
  );
}

// ─── List View ────────────────────────────────────────────────────────────────
function ListView({ list, allLists, nav }) {
  if (!list) return null;
  const s = listStatus(list);
  const days = daysUntil(list.distillableAt);
  const byType = { vocab:[], grammar:[], phrase:[] };
  list.entries.forEach(e => byType[e.type]?.push(e));

  return (
    <div className="fade-up">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
        <div>
          <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>
            {list.level===0 ? "Headlist" : `Distillation ${list.level} · from Day ${getRootDay(list, allLists)}`}
          </div>
          <div style={{ fontSize:26, fontWeight:700, marginBottom:4 }}>{list.level===0 ? `Day ${list.dayNumber}` : `D${list.level}`}</div>
          <div style={{ fontSize:14, color:C.muted }}>{fmtDate(list.createdAt)} · {list.entries.length} entries</div>
        </div>
        {s==="ready" && (
          <button onClick={() => nav("distillList", list.id)} style={{ background:C.green, border:"none", borderRadius:10, padding:"10px 18px", fontFamily:"Outfit, sans-serif", fontSize:13, fontWeight:700, cursor:"pointer", color:"#000" }}>Distill →</button>
        )}
        {s==="waiting" && (
          <div style={{ display:"flex", flexDirection:"column", gap:8, alignItems:"flex-end" }}>
            <div style={{ background:C.goldDim, border:`1px solid ${C.gold}40`, borderRadius:10, padding:"10px 16px", fontSize:13, color:C.gold, textAlign:"center" }}>
              <div style={{ fontWeight:700 }}>{days}d</div><div style={{ fontSize:11 }}>left</div>
            </div>
            <CalendarButton list={list} compact />
          </div>
        )}
        {s==="distilled" && (
          <div style={{ fontSize:12, color:C.green, background:C.greenDim, border:`1px solid ${C.green}40`, borderRadius:10, padding:"8px 14px", fontWeight:600 }}>✓ Distilled</div>
        )}
      </div>

      {[["vocab","단어"],["grammar","문법"],["phrase","표현"]].map(([key, label]) => {
        const entries = byType[key];
        if (!entries.length) return null;
        const tc = TYPE[key];
        return (
          <div key={key} style={{ marginBottom:24 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
              <div style={{ height:1, flex:1, background:`${tc.color}30` }} />
              <span style={{ fontFamily:"Noto Serif KR, serif", fontSize:12, color:tc.color, fontWeight:700 }}>{label}</span>
              <div style={{ height:1, flex:1, background:`${tc.color}30` }} />
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {entries.map((e,i) => <EntryRow key={e.id} entry={e} index={i+1} />)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Calendar Button ──────────────────────────────────────────────────────────
function CalendarButton({ list, compact = false }) {
  const [clicked, setClicked] = useState(false);
  const handle = () => { downloadICS(list); setClicked(true); setTimeout(() => setClicked(false), 2500); };
  if (compact) return (
    <button onClick={handle} style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8,
      padding:"5px 10px", cursor:"pointer", fontFamily:"Outfit, sans-serif",
      fontSize:11, color: clicked ? C.green : C.muted, fontWeight:600,
      display:"flex", alignItems:"center", gap:5, transition:"all 0.2s" }}>
      {clicked ? "✓ Downloaded!" : "📅 Add to Calendar"}
    </button>
  );
  return (
    <button onClick={handle} style={{ width:"100%", padding:"11px",
      border:`1px solid ${clicked ? C.green+"60" : C.border}`, borderRadius:10,
      background: clicked ? C.greenDim : "transparent", cursor:"pointer", fontFamily:"Outfit, sans-serif",
      fontSize:14, fontWeight:600, color: clicked ? C.green : C.muted,
      display:"flex", alignItems:"center", justifyContent:"center", gap:8, transition:"all 0.2s" }}>
      {clicked ? "✓ Calendar file downloaded!" : "📅 Add to Calendar"}
    </button>
  );
}

// ─── Shared ───────────────────────────────────────────────────────────────────
function EntryRow({ entry, index, onDelete }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12, padding:"13px 16px", display:"flex", gap:12, alignItems:"flex-start" }}>
      <div style={{ fontFamily:"DM Mono, monospace", color:C.muted, fontSize:11, paddingTop:4, minWidth:22 }}>
        {String(index).padStart(2,"0")}
      </div>
      <div style={{ flex:1 }}>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:3 }}>
          <span style={{ fontFamily:"Noto Serif KR, serif", fontSize:18, fontWeight:700 }}>{entry.korean}</span>
          <TypePill type={entry.type} />
        </div>
        <div style={{ fontSize:14, color:C.text }}>{entry.english}</div>
        {entry.note && <div style={{ fontSize:12, color:C.muted, marginTop:4, fontStyle:"italic" }}>{entry.note}</div>}
      </div>
      {onDelete && hovered && (
        <button onClick={e=>{e.stopPropagation();onDelete();}} style={{ background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:18, lineHeight:1, padding:"2px 4px", flexShrink:0 }}>×</button>
      )}
    </div>
  );
}

function TypePill({ type }) {
  const t = TYPE[type] || TYPE.vocab;
  return (
    <span style={{ background:t.dim, color:t.color, borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:700 }}>
      <span style={{ fontFamily:"Noto Serif KR, serif" }}>{t.label}</span>
    </span>
  );
}


// ─── Sentence List ────────────────────────────────────────────────────────────
const REG_COLORS = {
  formal:   { bg:"#0D1F33", fg:"#58A6FF" },
  casual:   { bg:"#0F2417", fg:"#3FB950" },
  written:  { bg:"#1A1030", fg:"#A78BFA" },
  spoken:   { bg:"#1E1A0D", fg:"#D4A84B" },
  academic: { bg:"#2A1A12", fg:"#E8734A" },
};

function SentenceList({ word, onClose }) {
  const [rows,    setRows]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);

  useEffect(() => {
    let cancelled = false;
    const timer = setTimeout(() => {
      if (!cancelled) { setError("Timed out — try again"); setLoading(false); }
    }, 20000);

    fetch("/api/lookup?mode=sentences", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ word })
    })
    .then(r => { if (!r.ok) throw new Error("HTTP_" + r.status); return r.json(); })
    .then(d => {
      const text = d.content.filter(b => b.type==="text").map(b => b.text).join("").replace(/```json|```/g,"").trim();
      const p = JSON.parse(text);
      const arr = Array.isArray(p) ? p : (p.sentences || []);
      if (!cancelled) { setRows(arr.length ? arr : null); setLoading(false); }
    })
    .catch(e => { if (!cancelled) { setError(String(e.message)); setLoading(false); } })
    .finally(() => clearTimeout(timer));

    return () => { cancelled = true; clearTimeout(timer); };
  }, [word]);

  return (
    <div className="fade-up" style={{ marginTop:16, paddingTop:16, borderTop:`1px solid ${C.border}` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:16, fontWeight:700 }}>Example Sentences</div>
          <div style={{ fontSize:12, color:C.muted }}>Real-life usage with nuance explained</div>
        </div>
        <button onClick={onClose} style={{ background:"transparent", border:"none",
          color:C.muted, cursor:"pointer", fontSize:20, padding:"4px 8px" }}>&#215;</button>
      </div>

      {loading && (
        <div style={{ textAlign:"center", padding:"32px 0", color:C.muted }}>
          <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:32, marginBottom:8,
            animation:"pulse 1.5s infinite" }}>{word}</div>
          <div style={{ fontSize:13 }}>Generating sentences...</div>
        </div>
      )}

      {error && !loading && (
        <div style={{ background:C.accentDim, border:`1px solid ${C.accent}40`,
          borderRadius:10, padding:"12px 16px", fontSize:13, color:C.muted }}>
          {error}
        </div>
      )}

      {rows && !loading && (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {rows.map((s, i) => {
            const rc = REG_COLORS[s.register] || REG_COLORS.casual;
            const kor = s.korean || "";
            const wi = kor.indexOf(word);
            return (
              <div key={i} style={{ background:C.surface, border:`1px solid ${C.border}`,
                borderRadius:14, padding:"16px 18px" }}>
                <span style={{ background:rc.bg, color:rc.fg, borderRadius:20,
                  padding:"2px 10px", fontSize:11, fontWeight:700, textTransform:"capitalize" }}>
                  {s.register || "example"}
                </span>
                <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:18,
                  lineHeight:1.7, color:C.text, marginTop:10, marginBottom:6 }}>
                  {wi === -1 ? kor : (
                    <>{kor.slice(0,wi)}<span style={{ color:C.accent, fontWeight:700 }}>{word}</span>{kor.slice(wi+word.length)}</>
                  )}
                </div>
                <div style={{ fontSize:13, color:C.muted, fontStyle:"italic", marginBottom:10 }}>{s.english}</div>
                {s.nuance && (
                  <div style={{ background:C.bg, borderRadius:8, padding:"10px 14px" }}>
                    <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.08em",
                      color:C.gold, marginBottom:4, fontWeight:600 }}>Nuance</div>
                    <div style={{ fontSize:13, color:C.muted, lineHeight:1.75 }}>{s.nuance}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── Practice View ────────────────────────────────────────────────────────────
const ERR_COLORS = {
  grammar:       { bg:"#1A1030", fg:"#A78BFA", label:"Grammar"      },
  vocabulary:    { bg:"#0D1F33", fg:"#58A6FF", label:"Vocabulary"   },
  spelling:      { bg:"#2D0A09", fg:"#F85149", label:"Spelling"     },
  naturalness:   { bg:"#1E1A0D", fg:"#D4A84B", label:"Naturalness"  },
  "word-choice": { bg:"#0F2417", fg:"#3FB950", label:"Word Choice"  },
};

function PracticeView() {
  const [sentence, setSentence] = useState("");
  const [result,   setResult]   = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const submit = async () => {
    if (!sentence.trim()) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const res = await fetch("/api/lookup?mode=correct", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ word: sentence.trim() })
      });
      if (!res.ok) throw new Error("HTTP_" + res.status);
      const d = await res.json();
      const text = d.content.filter(b => b.type==="text").map(b => b.text).join("").replace(/```json|```/g,"").trim();
      setResult(JSON.parse(text));
    } catch(e) { setError(String(e.message||"Unknown error")); }
    setLoading(false);
  };

  return (
    <div className="fade-up">
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:22, fontWeight:700, marginBottom:4 }}>Writing Practice</div>
        <div style={{ color:C.muted, fontSize:14 }}>Write Korean and get native-speaker corrections</div>
      </div>
      {!result && !loading && (
        <>
          <textarea value={sentence} onChange={e => setSentence(e.target.value)}
            placeholder="Korean sentence..."
            style={{ ...inputBase, height:160, resize:"vertical", fontSize:17,
              fontFamily:"Noto Serif KR, serif", lineHeight:1.7, paddingTop:14 }}
            onFocus={e => e.target.style.borderColor=C.accent}
            onBlur={e => e.target.style.borderColor=C.border}/>
          <button onClick={submit} disabled={!sentence.trim()} style={{
            width:"100%", marginTop:10, padding:"14px", border:"none", borderRadius:12,
            background:sentence.trim() ? C.accent : C.border,
            color:sentence.trim() ? "#000" : C.muted,
            cursor:sentence.trim() ? "pointer" : "default",
            fontFamily:"Outfit, sans-serif", fontSize:15, fontWeight:700 }}>
            Get Correction
          </button>
          {error && (
            <div style={{ marginTop:12, background:C.accentDim, border:`1px solid ${C.accent}40`,
              borderRadius:12, padding:"14px 18px" }}>
              <div style={{ fontWeight:600, color:C.accent, marginBottom:4 }}>Failed</div>
              <div style={{ fontSize:13, color:C.muted }}>{error}</div>
            </div>
          )}
        </>
      )}
      {loading && (
        <div style={{ textAlign:"center", padding:"48px 0", color:C.muted }}>
          <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:36, marginBottom:12,
            animation:"pulse 1.5s infinite" }}>선생</div>
          <div style={{ fontSize:14 }}>Reviewing...</div>
        </div>
      )}
      {result && (
        <div className="fade-up">
          <div style={{ background:C.surface, border:`1px solid ${C.border}`,
            borderRadius:14, padding:20, marginBottom:14 }}>
            <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em",
              color:C.muted, marginBottom:8, fontWeight:600 }}>Your sentence</div>
            <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:18, color:C.text, lineHeight:1.6 }}>
              {result.original || sentence}
            </div>
          </div>
          <div style={{ background:result.isCorrect ? C.greenDim : C.accentDim,
            border:`1px solid ${result.isCorrect ? C.green : C.accent}40`,
            borderRadius:14, padding:20, marginBottom:14 }}>
            <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em",
              color:result.isCorrect ? C.green : C.accent, marginBottom:8, fontWeight:600 }}>
              {result.isCorrect ? "✓ Perfect!" : "Corrected"}
            </div>
            <div style={{ fontFamily:"Noto Serif KR, serif", fontSize:20, fontWeight:700,
              color:C.text, lineHeight:1.6 }}>{result.corrected}</div>
          </div>
          {result.errors && result.errors.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em",
                color:C.muted, marginBottom:10, fontWeight:600 }}>Corrections</div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {result.errors.map((err, i) => {
                  const tc = ERR_COLORS[err.type] || ERR_COLORS.grammar;
                  return (
                    <div key={i} style={{ background:C.surface, border:`1px solid ${C.border}`,
                      borderRadius:12, padding:"14px 16px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, flexWrap:"wrap" }}>
                        <span style={{ background:tc.bg, color:tc.fg, borderRadius:20,
                          padding:"2px 10px", fontSize:11, fontWeight:700 }}>{tc.label}</span>
                        <span style={{ fontFamily:"Noto Serif KR, serif", fontSize:15,
                          color:"#F85149", textDecoration:"line-through" }}>{err.mistake}</span>
                        <span style={{ color:C.muted, fontSize:12 }}>→</span>
                        <span style={{ fontFamily:"Noto Serif KR, serif", fontSize:15,
                          color:C.green, fontWeight:700 }}>{err.correction}</span>
                      </div>
                      <p style={{ margin:0, fontSize:13, color:C.muted, lineHeight:1.7 }}>{err.explanation}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {result.tip && (
            <div style={{ background:C.goldDim, border:`1px solid ${C.gold}30`,
              borderRadius:12, padding:"14px 18px", marginBottom:14 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em",
                color:C.gold, marginBottom:6, fontWeight:600 }}>Tip</div>
              <p style={{ margin:0, fontSize:13, color:C.muted, lineHeight:1.8 }}>{result.tip}</p>
            </div>
          )}
          {result.encouragement && (
            <div style={{ background:C.surface, border:`1px solid ${C.border}`,
              borderRadius:12, padding:"14px 18px", marginBottom:20 }}>
              <p style={{ margin:0, fontSize:14, color:C.text, lineHeight:1.7 }}>{result.encouragement}</p>
            </div>
          )}
          <button onClick={() => { setResult(null); setSentence(""); setError(null); }}
            style={{ width:"100%", padding:"14px", border:"none", borderRadius:12,
              background:C.accent, color:"#000", cursor:"pointer",
              fontFamily:"Outfit, sans-serif", fontSize:15, fontWeight:700 }}>
            Try Another Sentence
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
